<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGuidance | Contact</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
        <a class="navbar-brand" href="index.htm">DOGuidance</a>
        <span class="navbar-text text-white">your dog guiding light</span>

        <div class="ml-auto">
            <a class="btn btn-outline-info" href="index.htm">Home</a>
        </div>
    </nav>

    <main class="container my-5">
        <section class="text-center mb-4">
            <h1>Contact DOGuidance</h1>
            <p class="lead">Send a message and take your next guided step.</p>
        </section>

        <section class="card custom-card">
            <div class="card-body">
                <form>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" class="form-control" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="custom-footer text-white text-center p-4 mt-5">
        <p>&copy; 2026 DOGuidance. All rights reserved.</p>
    </footer>

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
